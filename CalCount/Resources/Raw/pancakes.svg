<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#fffacd"/>

  <!-- Plate -->
  <ellipse cx="100" cy="120" rx="60" ry="18" fill="none" stroke="#daa520" stroke-width="2"/>
  <ellipse cx="100" cy="115" rx="60" ry="15" fill="#f5f5f5" stroke="#daa520" stroke-width="1"/>

  <!-- Pancake 1 (bottom) -->
  <ellipse cx="100" cy="110" rx="48" ry="16" fill="#d4a574" stroke="#8b6914" stroke-width="1.5"/>
  <ellipse cx="100" cy="108" rx="46" ry="14" fill="#daa520"/>

  <!-- Pancake 2 (middle) -->
  <ellipse cx="90" cy="85" rx="42" ry="14" fill="#c19a6b" stroke="#8b6914" stroke-width="1.5"/>
  <ellipse cx="90" cy="83" rx="40" ry="12" fill="#d2a679"/>

  <!-- Pancake 3 (top) -->
  <ellipse cx="105" cy="65" rx="40" ry="12" fill="#b8956a" stroke="#8b6914" stroke-width="1.5"/>
  <ellipse cx="105" cy="63" rx="38" ry="10" fill="#c4a374"/>

  <!-- Butter on top -->
  <ellipse cx="105" cy="55" rx="18" ry="8" fill="#ffe4b5" stroke="#ffa500" stroke-width="1"/>

  <!-- Syrup drips -->
  <path d="M 100 70 Q 98 85 97 105" stroke="#8b4513" stroke-width="1.5" fill="none"/>
  <path d="M 115 75 Q 113 90 112 108" stroke="#8b4513" stroke-width="1.5" fill="none"/>
  <path d="M 90 70 Q 88 88 86 110" stroke="#8b4513" stroke-width="1.5" fill="none"/>

  <!-- Syrup pools -->
  <ellipse cx="100" cy="115" rx="8" ry="3" fill="#8b4513" opacity="0.5"/>
  <ellipse cx="112" cy="110" rx="6" ry="2" fill="#8b4513" opacity="0.5"/>

  <!-- Label -->
  <text x="100" y="170" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Pancakes</text>
</svg>
