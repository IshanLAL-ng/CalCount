<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#fff8dc"/>

  <!-- Cake base layer 1 -->
  <ellipse cx="100" cy="130" rx="50" ry="15" fill="#3d2817" stroke="#1a0f0a" stroke-width="1"/>
  <rect x="50" y="115" width="100" height="15" fill="#4a3728" stroke="#1a0f0a" stroke-width="1"/>

  <!-- Cake base layer 2 -->
  <ellipse cx="100" cy="95" rx="45" ry="13" fill="#5c4033" stroke="#3e2723" stroke-width="1"/>
  <rect x="55" y="82" width="90" height="13" fill="#6d4c41" stroke="#3e2723" stroke-width="1"/>

  <!-- Cake top layer -->
  <ellipse cx="100" cy="70" rx="40" ry="12" fill="#6d4c41" stroke="#3e2723" stroke-width="1"/>
  <rect x="60" y="58" width="80" height="12" fill="#795548" stroke="#4e342e" stroke-width="1"/>

  <!-- Frosting swirl -->
  <path d="M 70 60 Q 80 50 90 55 Q 100 60 110 50 Q 120 45 130 55" fill="#8b4513" stroke="#654321" stroke-width="1" opacity="0.8"/>

  <!-- Chocolate chips -->
  <circle cx="75" cy="75" r="3" fill="#1a0f0a"/>
  <circle cx="95" cy="65" r="3" fill="#1a0f0a"/>
  <circle cx="110" cy="80" r="3" fill="#1a0f0a"/>
  <circle cx="85" cy="90" r="3" fill="#1a0f0a"/>

  <!-- Plate -->
  <ellipse cx="100" cy="145" rx="65" ry="12" fill="none" stroke="#daa520" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Label -->
  <text x="100" y="170" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Chocolate Cake</text>
</svg>
